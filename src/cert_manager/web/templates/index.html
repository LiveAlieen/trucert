<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证书生成与管理工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        
        .title-bar {
            background: #0078d4;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
        }
        
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #ccc;
        }
        
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 2px solid transparent;
        }
        
        .tab-btn:hover {
            background: #e8e8e8;
        }
        
        .tab-btn.active {
            background: white;
            border-bottom-color: #0078d4;
            color: #0078d4;
        }
        
        .tab-content {
            padding: 20px;
            min-height: 400px;
        }
        
        .tab-pane {
            display: none;
        }
        
        .tab-pane.active {
            display: block;
        }
        
        .section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #555;
        }
        
        input, select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 13px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #0078d4;
        }
        
        .btn {
            padding: 6px 15px;
            border: 1px solid #ccc;
            border-radius: 3px;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 13px;
            margin-right: 5px;
        }
        
        .btn:hover {
            background: #e8e8e8;
        }
        
        .btn-primary {
            background: #0078d4;
            color: white;
            border-color: #0078d4;
        }
        
        .btn-primary:hover {
            background: #005a9e;
        }
        
        .btn-danger {
            background: #d13438;
            color: white;
            border-color: #d13438;
        }
        
        .btn-danger:hover {
            background: #a4262c;
        }
        
        .list {
            list-style: none;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        
        .list-item {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }
        
        .list-item:hover {
            background: #f5f5f5;
        }
        
        .status-bar {
            background: #f5f5f5;
            border-top: 1px solid #ccc;
            padding: 8px 15px;
            font-size: 12px;
            color: #666;
        }
        
        .message {
            padding: 8px 12px;
            border-radius: 3px;
            margin-top: 10px;
            font-size: 13px;
        }
        
        .message.success {
            background: #dff6dd;
            color: #107c10;
            border: 1px solid #107c10;
        }
        
        .message.error {
            background: #fde7e9;
            color: #a80000;
            border: 1px solid #a80000;
        }
        
        .row {
            display: flex;
            gap: 15px;
        }
        
        .col {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-bar">证书生成与管理工具</div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="keys">密钥管理</button>
            <button class="tab-btn" data-tab="certs">证书管理</button>
            <button class="tab-btn" data-tab="sign">文件签名</button>
            <button class="tab-btn" data-tab="verify">验证</button>
        </div>
        
        <div class="tab-content">
            <div id="keys" class="tab-pane active">
                <div class="section">
                    <div class="section-title">生成密钥对</div>
                    <div class="form-group">
                        <label>密钥类型</label>
                        <select id="keyType">
                            <option value="RSA">RSA</option>
                            <option value="ECC">ECC</option>
                        </select>
                    </div>
                    <div class="form-group" id="rsaParams">
                        <label>密钥大小</label>
                        <select id="keySize">
                            <option value="2048">2048</option>
                            <option value="3072">3072</option>
                            <option value="4096">4096</option>
                        </select>
                    </div>
                    <div class="form-group" id="eccParams" style="display:none;">
                        <label>曲线类型</label>
                        <select id="curve">
                            <option value="SECP256R1">SECP256R1</option>
                            <option value="SECP384R1">SECP384R1</option>
                            <option value="SECP521R1">SECP521R1</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="generateKey()">生成密钥对</button>
                </div>
                
                <div class="section">
                    <div class="section-title">存储的密钥</div>
                    <ul class="list" id="keyList"></ul>
                </div>
                
                <div id="keyMessage"></div>
            </div>
            
            <div id="certs" class="tab-pane">
                <div class="section">
                    <div class="section-title">生成自签名证书</div>
                    <div class="form-group">
                        <label>选择密钥</label>
                        <select id="certKeySelect"></select>
                    </div>
                    <div class="row">
                        <div class="col">
                            <div class="form-group">
                                <label>有效期 (天)</label>
                                <input type="number" id="certValidity" value="365">
                            </div>
                        </div>
                        <div class="col">
                            <div class="form-group">
                                <label>时间偏移 (秒)</label>
                                <input type="number" id="certOffset" value="0">
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="generateCert()">生成证书</button>
                </div>
                
                <div class="section">
                    <div class="section-title">存储的证书</div>
                    <ul class="list" id="certList"></ul>
                </div>
                
                <div id="certMessage"></div>
            </div>
            
            <div id="sign" class="tab-pane">
                <div class="section">
                    <div class="section-title">单文件签名</div>
                    <div class="form-group">
                        <label>选择文件</label>
                        <input type="file" id="signFile">
                    </div>
                    <div class="form-group">
                        <label>选择密钥</label>
                        <select id="signKeySelect"></select>
                    </div>
                    <div class="form-group">
                        <label>哈希算法</label>
                        <select id="signHash">
                            <option value="sha256">SHA256</option>
                            <option value="sha384">SHA384</option>
                            <option value="sha512">SHA512</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="signFile()">生成签名</button>
                </div>
                
                <div class="section">
                    <div class="section-title">批量文件签名</div>
                    <div class="form-group">
                        <label>选择文件（可多选）</label>
                        <input type="file" id="batchSignFiles" multiple>
                    </div>
                    <div class="form-group">
                        <label>选择密钥</label>
                        <select id="batchSignKeySelect"></select>
                    </div>
                    <div class="form-group">
                        <label>哈希算法</label>
                        <select id="batchSignHash">
                            <option value="sha256">SHA256</option>
                            <option value="sha384">SHA384</option>
                            <option value="sha512">SHA512</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="batchSignFiles()">批量生成签名</button>
                </div>
                
                <div id="signMessage"></div>
            </div>
            
            <div id="verify" class="tab-pane">
                <div class="section">
                    <div class="section-title">验证文件签名</div>
                    <div class="form-group">
                        <label>选择文件</label>
                        <input type="file" id="verifyFile">
                    </div>
                    <div class="form-group">
                        <label>选择签名文件</label>
                        <input type="file" id="verifySig" onchange="handleSignatureFileSelect()">
                    </div>
                    <div class="form-group">
                        <label>选择密钥</label>
                        <select id="verifyKeySelect"></select>
                    </div>
                    <button class="btn btn-primary" onclick="verifyFile()">验证签名</button>
                </div>
                
                <div id="verifyMessage"></div>
            </div>
        </div>
        
        <div class="status-bar" id="statusBar">就绪</div>
    </div>

    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.tab).classList.add('active');
            });
        });
        
        document.getElementById('keyType').addEventListener('change', function() {
            if (this.value === 'RSA') {
                document.getElementById('rsaParams').style.display = 'block';
                document.getElementById('eccParams').style.display = 'none';
            } else {
                document.getElementById('rsaParams').style.display = 'none';
                document.getElementById('eccParams').style.display = 'block';
            }
        });
        
        window.addEventListener('load', function() {
            loadKeys();
            loadCerts();
        });
        
        function setStatus(message) {
            document.getElementById('statusBar').textContent = message;
        }
        
        function showMessage(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="message ${type}">${message}</div>`;
        }
        
        async function loadKeys() {
            try {
                const response = await fetch('/api/keys');
                const data = await response.json();
                
                if (data.success) {
                    const keyList = document.getElementById('keyList');
                    keyList.innerHTML = '';
                    
                    data.keys.forEach(key => {
                        const li = document.createElement('li');
                        li.className = 'list-item';
                        const keyInfo = `${key.id} (${key.type || 'Unknown'}${key.key_size ? ` - ${key.key_size}` : ''}${key.curve ? ` - ${key.curve}` : ''})`;
                        li.innerHTML = `
                            <span>${keyInfo}</span>
                            <button class="btn btn-danger" onclick="deleteKey('${key.id}')">删除</button>
                        `;
                        keyList.appendChild(li);
                    });
                    
                    updateKeySelects(data.keys);
                    setStatus('密钥列表已加载');
                }
            } catch (e) {
                console.error(e);
                setStatus('加载密钥失败');
            }
        }
        
        function updateKeySelects(keys) {
            const selects = ['certKeySelect', 'signKeySelect', 'verifyKeySelect', 'batchSignKeySelect'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                if (select) {
                    select.innerHTML = '<option value="">选择密钥</option>';
                    keys.forEach(key => {
                        select.innerHTML += `<option value="${key.id}">${key.id}</option>`;
                    });
                }
            });
        }
        
        async function generateKey() {
            try {
                const keyType = document.getElementById('keyType').value;
                const data = { type: keyType };
                
                if (keyType === 'RSA') {
                    data.key_size = parseInt(document.getElementById('keySize').value);
                } else {
                    data.curve = document.getElementById('curve').value;
                }
                
                setStatus('正在生成密钥...');
                
                const response = await fetch('/api/keys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('keyMessage', '密钥生成成功！', 'success');
                    loadKeys();
                } else {
                    showMessage('keyMessage', '密钥生成失败: ' + result.error, 'error');
                }
            } catch (e) {
                showMessage('keyMessage', '错误: ' + e.message, 'error');
            }
        }
        
        async function deleteKey(keyId) {
            if (confirm('确定要删除这个密钥吗？')) {
                try {
                    const response = await fetch(`/api/keys/${keyId}`, {
                        method: 'DELETE'
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showMessage('keyMessage', '密钥删除成功！', 'success');
                        loadKeys();
                    } else {
                        showMessage('keyMessage', '密钥删除失败: ' + result.error, 'error');
                    }
                } catch (e) {
                    showMessage('keyMessage', '错误: ' + e.message, 'error');
                }
            }
        }
        
        async function loadCerts() {
            try {
                const response = await fetch('/api/certs');
                const data = await response.json();
                
                if (data.success) {
                    const certList = document.getElementById('certList');
                    certList.innerHTML = '';
                    
                    data.certs.forEach(cert => {
                        const li = document.createElement('li');
                        li.className = 'list-item';
                        li.innerHTML = `
                            <span>${cert.filename || cert.path} (${cert.type || 'certificate'})</span>
                            <button class="btn btn-danger" onclick="deleteCert('${encodeURIComponent(cert.path || cert.filename)}')">删除</button>
                        `;
                        certList.appendChild(li);
                    });
                    setStatus('证书列表已加载');
                }
            } catch (e) {
                console.error(e);
                setStatus('加载证书失败');
            }
        }
        
        async function generateCert() {
            try {
                const keyId = document.getElementById('certKeySelect').value;
                if (!keyId) {
                    showMessage('certMessage', '请选择密钥', 'error');
                    return;
                }
                
                const data = {
                    key_id: keyId,
                    validity_days: parseInt(document.getElementById('certValidity').value),
                    forward_offset: parseInt(document.getElementById('certOffset').value)
                };
                
                setStatus('正在生成证书...');
                
                const response = await fetch('/api/certs/self-signed', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('certMessage', '证书生成成功！', 'success');
                    loadCerts();
                } else {
                    showMessage('certMessage', '证书生成失败: ' + result.error, 'error');
                }
            } catch (e) {
                showMessage('certMessage', '错误: ' + e.message, 'error');
            }
        }
        
        async function deleteCert(certPath) {
            if (confirm('确定要删除这个证书吗？')) {
                try {
                    const response = await fetch(`/api/certs/${certPath}`, {
                        method: 'DELETE'
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showMessage('certMessage', '证书删除成功！', 'success');
                        loadCerts();
                    } else {
                        showMessage('certMessage', '证书删除失败: ' + result.error, 'error');
                    }
                } catch (e) {
                    showMessage('certMessage', '错误: ' + e.message, 'error');
                }
            }
        }
        
        async function signFile() {
            try {
                const fileInput = document.getElementById('signFile');
                const keyId = document.getElementById('signKeySelect').value;
                
                if (!fileInput.files[0]) {
                    showMessage('signMessage', '请选择文件', 'error');
                    return;
                }
                
                if (!keyId) {
                    showMessage('signMessage', '请选择密钥', 'error');
                    return;
                }
                
                setStatus('正在签名文件...');
                
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('key_id', keyId);
                formData.append('hash_algorithm', document.getElementById('signHash').value);
                
                const response = await fetch('/api/sign/file', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('signMessage', '文件签名成功！', 'success');
                    
                    const sigData = JSON.stringify(result.signature, null, 2);
                    const blob = new Blob([sigData], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = result.filename;
                    a.click();
                    URL.revokeObjectURL(url);
                } else {
                    showMessage('signMessage', '文件签名失败: ' + result.error, 'error');
                }
            } catch (e) {
                showMessage('signMessage', '错误: ' + e.message, 'error');
            }
        }
        
        async function batchSignFiles() {
            try {
                const fileInput = document.getElementById('batchSignFiles');
                const keyId = document.getElementById('batchSignKeySelect').value;
                
                if (!fileInput.files || fileInput.files.length === 0) {
                    showMessage('signMessage', '请选择文件', 'error');
                    return;
                }
                
                if (!keyId) {
                    showMessage('signMessage', '请选择密钥', 'error');
                    return;
                }
                
                setStatus('正在批量签名文件...');
                
                const formData = new FormData();
                for (let i = 0; i < fileInput.files.length; i++) {
                    formData.append('files', fileInput.files[i]);
                }
                formData.append('key_id', keyId);
                formData.append('hash_algorithm', document.getElementById('batchSignHash').value);
                
                const response = await fetch('/api/sign/batch', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('signMessage', `批量签名成功！共处理 ${result.total_files} 个文件，成功 ${result.successful_files} 个`, 'success');
                    
                    const sigData = JSON.stringify(result.signature, null, 2);
                    const blob = new Blob([sigData], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = result.filename;
                    a.click();
                    URL.revokeObjectURL(url);
                } else {
                    showMessage('signMessage', '批量签名失败: ' + result.error, 'error');
                }
            } catch (e) {
                showMessage('signMessage', '错误: ' + e.message, 'error');
            }
        }
        
        function handleSignatureFileSelect() {
            const sigInput = document.getElementById('verifySig');
            if (!sigInput.files[0]) return;
            
            const file = sigInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const sigData = JSON.parse(e.target.result);
                    
                    // Check if it's a batch signature
                    if (sigData.batch_signatures) {
                        showMessage('verifyMessage', '批量签名文件已选择，包含 ' + sigData.batch_signatures.length + ' 个文件的签名', 'info');
                    } else if (sigData.file_info && sigData.file_info.filename) {
                        // For single file signature, try to find the file
                        showMessage('verifyMessage', '签名文件已选择，对应文件: ' + sigData.file_info.filename, 'info');
                        
                        // Try to automatically select the corresponding file
                        // Note: This is a limitation of web browsers - we can't programmatically set file input values
                        // due to security restrictions. We can only provide a message to the user.
                        showMessage('verifyMessage', '请选择对应文件: ' + sigData.file_info.filename, 'info');
                    }
                } catch (e) {
                    showMessage('verifyMessage', '签名文件格式错误', 'error');
                }
            };
            
            reader.readAsText(file);
        }
        
        async function verifyFile() {
            try {
                const fileInput = document.getElementById('verifyFile');
                const sigInput = document.getElementById('verifySig');
                const keyId = document.getElementById('verifyKeySelect').value;
                
                if (!fileInput.files[0] || !sigInput.files[0]) {
                    showMessage('verifyMessage', '请选择文件和签名', 'error');
                    return;
                }
                
                if (!keyId) {
                    showMessage('verifyMessage', '请选择密钥', 'error');
                    return;
                }
                
                setStatus('正在验证签名...');
                
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('signature', sigInput.files[0]);
                formData.append('key_id', keyId);
                
                const response = await fetch('/api/verify/file', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    if (result.valid) {
                        showMessage('verifyMessage', '签名验证成功！', 'success');
                    } else {
                        showMessage('verifyMessage', '签名验证失败！', 'error');
                    }
                } else {
                    showMessage('verifyMessage', '验证失败: ' + result.error, 'error');
                }
            } catch (e) {
                showMessage('verifyMessage', '错误: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
