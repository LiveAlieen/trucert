<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证书管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .tabs {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .tab-nav {
            display: flex;
            background: #f0f0f0;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab-btn {
            flex: 1;
            padding: 20px;
            border: none;
            background: none;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        
        .tab-btn:hover {
            background: #e8e8e8;
        }
        
        .tab-btn.active {
            background: white;
            border-bottom-color: #667eea;
            font-weight: bold;
            color: #667eea;
        }
        
        .tab-content {
            padding: 30px;
        }
        
        .tab-pane {
            display: none;
        }
        
        .tab-pane.active {
            display: block;
        }
        
        .section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .list {
            list-style: none;
            margin-top: 10px;
        }
        
        .list-item {
            padding: 12px;
            background: white;
            border: 1px solid #eee;
            border-radius: 5px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .row {
            display: flex;
            gap: 15px;
        }
        
        .col {
            flex: 1;
        }
        
        textarea {
            height: 150px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 证书管理系统</h1>
        
        <div class="tabs">
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="keys">密钥管理</button>
                <button class="tab-btn" data-tab="certs">证书管理</button>
                <button class="tab-btn" data-tab="sign">文件签名</button>
                <button class="tab-btn" data-tab="verify">签名验证</button>
            </div>
            
            <div class="tab-content">
                <!-- 密钥管理 -->
                <div id="keys" class="tab-pane active">
                    <div class="section">
                        <div class="section-title">生成密钥对</div>
                        <div class="form-group">
                            <label>密钥类型</label>
                            <select id="keyType">
                                <option value="RSA">RSA</option>
                                <option value="ECC">ECC</option>
                            </select>
                        </div>
                        <div class="form-group" id="rsaParams">
                            <label>密钥大小</label>
                            <select id="keySize">
                                <option value="2048">2048</option>
                                <option value="3072">3072</option>
                                <option value="4096">4096</option>
                            </select>
                        </div>
                        <div class="form-group" id="eccParams" style="display:none;">
                            <label>曲线类型</label>
                            <select id="curve">
                                <option value="SECP256R1">SECP256R1</option>
                                <option value="SECP384R1">SECP384R1</option>
                                <option value="SECP521R1">SECP521R1</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="generateKey()">生成密钥对</button>
                    </div>
                    
                    <div class="section">
                        <div class="section-title">存储的密钥</div>
                        <ul class="list" id="keyList"></ul>
                    </div>
                </div>
                
                <!-- 证书管理 -->
                <div id="certs" class="tab-pane">
                    <div class="section">
                        <div class="section-title">生成自签名证书</div>
                        <div class="form-group">
                            <label>选择密钥</label>
                            <select id="certKeySelect"></select>
                        </div>
                        <div class="row">
                            <div class="col">
                                <div class="form-group">
                                    <label>有效期 (天)</label>
                                    <input type="number" id="certValidity" value="365">
                                </div>
                            </div>
                            <div class="col">
                                <div class="form-group">
                                    <label>时间偏移 (秒)</label>
                                    <input type="number" id="certOffset" value="0">
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="generateCert()">生成证书</button>
                    </div>
                    
                    <div class="section">
                        <div class="section-title">存储的证书</div>
                        <ul class="list" id="certList"></ul>
                    </div>
                </div>
                
                <!-- 文件签名 -->
                <div id="sign" class="tab-pane">
                    <div class="section">
                        <div class="section-title">签名文件</div>
                        <div class="form-group">
                            <label>选择文件</label>
                            <input type="file" id="signFile">
                        </div>
                        <div class="form-group">
                            <label>选择密钥</label>
                            <select id="signKeySelect"></select>
                        </div>
                        <div class="form-group">
                            <label>哈希算法</label>
                            <select id="signHash">
                                <option value="sha256">SHA256</option>
                                <option value="sha384">SHA384</option>
                                <option value="sha512">SHA512</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="signFile()">签名文件</button>
                        <div id="signResult"></div>
                    </div>
                </div>
                
                <!-- 签名验证 -->
                <div id="verify" class="tab-pane">
                    <div class="section">
                        <div class="section-title">验证文件签名</div>
                        <div class="form-group">
                            <label>选择文件</label>
                            <input type="file" id="verifyFile">
                        </div>
                        <div class="form-group">
                            <label>选择签名文件</label>
                            <input type="file" id="verifySig">
                        </div>
                        <div class="form-group">
                            <label>选择密钥</label>
                            <select id="verifyKeySelect"></select>
                        </div>
                        <button class="btn btn-primary" onclick="verifyFile()">验证签名</button>
                        <div id="verifyResult"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        // 标签页切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.tab).classList.add('active');
            });
        });
        
        // 密钥类型切换
        document.getElementById('keyType').addEventListener('change', function() {
            if (this.value === 'RSA') {
                document.getElementById('rsaParams').style.display = 'block';
                document.getElementById('eccParams').style.display = 'none';
            } else {
                document.getElementById('rsaParams').style.display = 'none';
                document.getElementById('eccParams').style.display = 'block';
            }
        });
        
        // 页面加载时获取数据
        window.addEventListener('load', function() {
            loadKeys();
            loadCerts();
        });
        
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.textContent = message;
        }
        
        async function loadKeys() {
            try {
                const response = await fetch('/api/keys');
                const data = await response.json();
                
                if (data.success) {
                    const keyList = document.getElementById('keyList');
                    keyList.innerHTML = '';
                    
                    data.keys.forEach(key => {
                        const li = document.createElement('li');
                        li.className = 'list-item';
                        li.innerHTML = `
                            <span>${key.id} - ${key.type || 'Unknown'}
                            ${key.key_size ? `- ${key.key_size}` : ''}
                            ${key.curve ? `- ${key.curve}` : ''}
                        </span>
                        <button class="btn btn-danger" onclick="deleteKey('${key.id}')">删除</button>
                    `;
                        keyList.appendChild(li);
                    });
                    
                    updateKeySelects(data.keys);
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        function updateKeySelects(keys) {
            const selects = ['certKeySelect', 'signKeySelect', 'verifyKeySelect'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                if (select) {
                    select.innerHTML = '<option value="">选择密钥</option>';
                    keys.forEach(key => {
                        select.innerHTML += `<option value="${key.id}">${key.id}</option>`;
                    });
                }
            });
        }
        
        async function generateKey() {
            try {
                const keyType = document.getElementById('keyType').value;
                const data = { type: keyType };
                
                if (keyType === 'RSA') {
                    data.key_size = parseInt(document.getElementById('keySize').value);
                } else {
                    data.curve = document.getElementById('curve').value;
                }
                
                const response = await fetch('/api/keys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('密钥生成成功!', 'success');
                    loadKeys();
                } else {
                    showStatus('密钥生成失败: ' + result.error, 'error');
                }
            } catch (e) {
                showStatus('错误: ' + e.message, 'error');
            }
        }
        
        async function deleteKey(keyId) {
            if (confirm('确定要删除这个密钥吗？')) {
                try {
                    const response = await fetch(`/api/keys/${keyId}`, {
                        method: 'DELETE'
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showStatus('密钥删除成功!', 'success');
                        loadKeys();
                    } else {
                        showStatus('密钥删除失败: ' + result.error, 'error');
                    }
                } catch (e) {
                    showStatus('错误: ' + e.message, 'error');
                }
            }
        }
        
        async function loadCerts() {
            try {
                const response = await fetch('/api/certs');
                const data = await response.json();
                
                if (data.success) {
                    const certList = document.getElementById('certList');
                    certList.innerHTML = '';
                    
                    data.certs.forEach(cert => {
                        const li = document.createElement('li');
                        li.className = 'list-item';
                        li.innerHTML = `
                            <span>${cert.filename} - ${cert.type}</span>
                            <button class="btn btn-danger" onclick="deleteCert('${cert.path}')">删除</button>
                        `;
                        certList.appendChild(li);
                    });
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        async function generateCert() {
            try {
                const keyId = document.getElementById('certKeySelect').value;
                if (!keyId) {
                    showStatus('请选择密钥', 'error');
                    return;
                }
                
                const data = {
                    key_id: keyId,
                    validity_days: parseInt(document.getElementById('certValidity').value),
                    forward_offset: parseInt(document.getElementById('certOffset').value)
                };
                
                const response = await fetch('/api/certs/self-signed', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('证书生成成功!', 'success');
                    loadCerts();
                } else {
                    showStatus('证书生成失败: ' + result.error, 'error');
                }
            } catch (e) {
                showStatus('错误: ' + e.message, 'error');
            }
        }
        
        async function deleteCert(certPath) {
            if (confirm('确定要删除这个证书吗？')) {
                try {
                    const response = await fetch(`/api/certs/${encodeURIComponent(certPath)}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('证书删除成功!', 'success');
                    loadCerts();
                } else {
                    showStatus('证书删除失败: ' + result.error, 'error');
                }
            } catch (e) {
                showStatus('错误: ' + e.message, 'error');
            }
        }
        
        async function signFile() {
            try {
                const fileInput = document.getElementById('signFile');
                const keyId = document.getElementById('signKeySelect').value;
                
                if (!fileInput.files[0]) {
                    showStatus('请选择文件', 'error');
                    return;
                }
                
                if (!keyId) {
                    showStatus('请选择密钥', 'error');
                    return;
                }
                
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('key_id', keyId);
                formData.append('hash_algorithm', document.getElementById('signHash').value);
                
                const response = await fetch('/api/sign/file', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('文件签名成功!', 'success');
                    
                    const sigData = JSON.stringify(result.signature, null, 2);
                    const blob = new Blob([sigData], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = result.filename;
                    a.click();
                    URL.revokeObjectURL(url);
                } else {
                    showStatus('文件签名失败: ' + result.error, 'error');
                }
            } catch (e) {
                showStatus('错误: ' + e.message, 'error');
            }
        }
        
        async function verifyFile() {
            try {
                const fileInput = document.getElementById('verifyFile');
                const sigInput = document.getElementById('verifySig');
                const keyId = document.getElementById('verifyKeySelect').value;
                
                if (!fileInput.files[0] || !sigInput.files[0]) {
                    showStatus('请选择文件和签名', 'error');
                    return;
                }
                
                if (!keyId) {
                    showStatus('请选择密钥', 'error');
                    return;
                }
                
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('signature', sigInput.files[0]);
                formData.append('key_id', keyId);
                
                const response = await fetch('/api/verify/file', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    if (result.valid) {
                        showStatus('签名验证成功!', 'success');
                    } else {
                        showStatus('签名验证失败!', 'error');
                    }
                } else {
                    showStatus('验证失败: ' + result.error, 'error');
                }
            } catch (e) {
                showStatus('错误: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
